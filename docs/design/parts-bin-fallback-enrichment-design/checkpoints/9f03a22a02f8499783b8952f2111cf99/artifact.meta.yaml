stage_metadata:
  design_unit_id: parts-bin-fallback-enrichment-design
  title: Fallback Enrichment Pipeline
  status: draft
  readiness: high
  readiness_rationale: The fallback chain, writable field set, blocking conflict criteria,
    and runtime outcomes are concrete enough that implementation should not need to
    invent core behavior. Remaining uncertainty is limited to provenance persistence
    depth.
  scope_summary: Design for a bounded fallback enrichment pipeline using API data
    first, then API-derived product pages and PDFs, then confirmed search escalation,
    with per-field provenance, blocking conflict handling, and explicit runtime outcomes.
  assumptions:
  - Primary distributor APIs remain the preferred first source even when they are
    sparse.
  - API-derived product pages and PDFs can provide missing inventory-relevant fields
    often enough to justify dedicated fallback stages.
  - Automatic inventory updates should be decided from field-level provenance rather
    than request-level success alone.
  open_questions:
  - Whether provenance needs durable storage or only runtime/log visibility.
