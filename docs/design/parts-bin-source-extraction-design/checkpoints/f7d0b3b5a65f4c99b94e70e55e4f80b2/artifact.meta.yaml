stage_metadata:
  design_unit_id: parts-bin-source-extraction-design
  title: Source Retrieval And Extraction
  status: draft
  readiness: medium
  readiness_rationale: The subsystem boundary, staged extraction model, and failure
    semantics are concrete, but extractor specialization and evidence retention strategy
    still need explicit decisions.
  scope_summary: Child design unit for fetching and extracting metadata from API-derived
    product pages and PDFs within the fallback enrichment pipeline.
  assumptions:
  - API-derived pages and PDFs can be fetched directly enough for bounded automated
    extraction.
  - Known providers will benefit from source-specific extraction logic rather than
    relying only on generic parsers.
  open_questions:
  - Should known providers get dedicated extractor modules immediately, or should
    implementation start with one generic HTML extractor plus one DigiKey-specific
    parser?
  - What raw evidence should be stored durably versus referenced indirectly in provenance
    records?
  depends_on:
  - parts-bin-fallback-enrichment-design
