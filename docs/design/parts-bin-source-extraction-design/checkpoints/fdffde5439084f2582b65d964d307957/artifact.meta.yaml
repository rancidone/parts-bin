stage_metadata:
  design_unit_id: parts-bin-source-extraction-design
  title: Source Retrieval And Extraction
  status: accepted
  readiness: high
  readiness_rationale: Core extraction behavior is still design-ready. Remaining follow-ups
    are bounded implementation-policy questions about evidence retention depth and
    stricter ambiguity suppression for PDF-derived candidates.
  scope_summary: Child design unit for fetching and extracting metadata from API-derived
    product pages and PDFs using dedicated DigiKey and LCSC parsers plus bounded fuzzy
    fallback.
  assumptions:
  - API-derived pages and PDFs can be fetched directly enough for bounded automated
    extraction.
  - DigiKey and LCSC are important enough to justify dedicated parser logic.
  - Bounded fuzzy matching can reduce parser brittleness without turning extraction
    into unrestricted scraping.
  open_questions:
  - What raw evidence should be stored durably versus referenced indirectly in provenance
    records?
  - Should PDF extraction explicitly suppress family-level or multi-variant candidate
    fields when exact variant identity is not proven?
  depends_on:
  - parts-bin-fallback-enrichment-design
